services:
  - type: web
    name: eresumehub-backend
    env: python
    region: oregon 
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        fromService:
          name: eresumehub-redis
          type: redis
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://eresumehub.netlify.app,https://eresumehub.com"
      - key: AI_PROVIDER_ORDER
        value: "groq,gemini,openrouter"
      - key: X_STAFF_SECRET
        generateValue: true

  - type: worker
    name: eresumehub-worker
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python worker.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        fromService:
          name: eresumehub-redis
          type: redis
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "10"

databases:
  - name: eresumehub-redis
    type: redis
    region: oregon
    plan: free # Change to 'standard' for production SLAs
    ipAllowList: [] 
