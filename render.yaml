services:
  - type: web
    name: eresumehub-backend
    env: python
    region: oregon 
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ERESUME_REDIS_URL
        fromService:
          name: eresumehub-redis
          type: redis
          property: internalConnectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://eresumehub.netlify.app,https://eresumehub.com"
      - key: AI_PROVIDER_ORDER
        value: "groq,gemini,openrouter"
      - key: X_STAFF_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        value: "support@eresumehub.com"

databases:
  - name: eresumehub-redis
    type: redis
    region: oregon
    plan: standard # Use standard for production SLAs and persistence
    ipAllowList: []
