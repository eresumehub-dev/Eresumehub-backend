services:
  - type: web
    name: eresumehub-backend
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
        # Change ALLOWED_ORIGINS to your Netlify URL once deployed (e.g. "https://eresumehub.netlify.app")
